<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quest</title>

    <!-- Tailwind CSS for Layout Architecture -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts: Playfair Display & Reenie Beanie -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Reenie+Beanie&family=Inter:wght=300;400&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .cursive-accent {
            font-family: 'Reenie Beanie', cursive;
            font-size: 3.5rem;
            line-height: 1;
        }

        .serif-title {
            font-family: 'Playfair Display', serif;
        }
    </style>

    <!-- Offer18 Web SDK Core Module -->
    <script src="https://web-resources.offer18.net/sdk/web/WebSDK.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (window.Offer18WebSDK) {
                window.Offer18WebSDK.initializeUrlParam('clickid');
                console.log("Offer18 SDK initialized.");
            }
        });
    </script>
</head>

<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-6 select-none">

    <!-- Minimalist Content Card -->
    <div class="max-w-md w-full border border-zinc-800 bg-zinc-950/40 rounded-3xl p-10 text-center backdrop-blur-sm">

        <!-- Cursive Accent Header -->
        <span class="cursive-accent block text-zinc-400 mb-1">the journey</span>

        <!-- Serif Main Header -->
        <h1 class="serif-title text-4xl font-light tracking-wide mb-3 uppercase text-zinc-100">
            Verify Identity
        </h1>

        <p id="quest-desc"
            class="text-zinc-500 font-light text-xs tracking-wider uppercase mb-8 max-w-xs mx-auto leading-relaxed">
            Link an installed signature wallet below to route your data.
        </p>

        <!-- Dynamic EIP-6963 Wallet Injection List -->
        <div id="wallet-list" class="flex flex-col gap-3 w-full">
            <p id="loading-wallets" class="text-zinc-600 text-xs tracking-widest uppercase py-4">Scanning extensions...
            </p>
        </div>

        <!-- Minimal Success UI (Hidden by default) -->
        <div id="success-box" class="hidden mt-4 pt-6 border-t border-zinc-900 transition-all duration-500 w-full">
            <span class="cursive-accent block text-emerald-500 mb-2">completed</span>

            <p class="text-zinc-400 text-xs font-light tracking-widest uppercase mb-4">
                Identity Mapped
            </p>

            <div id="wallet-address"
                class="text-[10px] text-zinc-500 font-mono tracking-normal bg-zinc-900/30 border border-zinc-900/80 p-3 rounded-xl break-all mb-6">
            </div>

            <!-- Disconnect Wallet Button Trigger -->
            <button onclick="disconnectWalletContext()"
                class="w-full bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-200 font-medium tracking-widest text-[10px] uppercase py-3 px-6 rounded-full transition-all duration-300 border border-zinc-800 cursor-pointer mb-4">
                Disconnect Wallet
            </button>

            <p class="text-[10px] text-zinc-600 font-light tracking-wide italic">
                Data packet routed via proxy node.
            </p>
        </div>
    </div>

    <!-- Footnote Component -->
    <p class="text-[10px] text-zinc-700 tracking-widest uppercase mt-8 absolute bottom-6 serif-title">
        Web3Cash Integration Layer
    </p>

    <!-- Pure Native EIP-6963 Interceptor Logic -->
    <script>
        const supportedProviders = [];
        let conversionFired = false;
        let activeProvider = null; // Tracks which wallet is currently running the session

        const walletListContainer = document.getElementById('wallet-list');
        const loadingText = document.getElementById('loading-wallets');

        // 1. Listen for standard EIP-6963 announcements from extensions (SubWallet, Phantom, MetaMask, etc.)
        window.addEventListener("eip6963:announceProvider", (event) => {
            const providerDetail = event.detail;

            if (supportedProviders.some(p => p.info.uuid === providerDetail.info.uuid)) return;

            supportedProviders.push(providerDetail);
            renderWalletButtons();
        });

        // 2. Fire the global event tracking discovery probe
        window.dispatchEvent(new Event("eip6963:requestProvider"));

        // Fallback: If no EIP-6963 announcements clear within 1 second, look for standard window.ethereum
        setTimeout(() => {
            if (supportedProviders.length === 0) {
                if (window.ethereum) {
                    loadingText.classList.add('hidden');
                    createWalletButton({
                        info: { name: 'Injected Wallet', icon: 'https://placeholder.co/32' },
                        provider: window.ethereum
                    });
                } else {
                    loadingText.innerText = "NO EXTENSIONS DETECTED";
                }
            }
        }, 1000);

        // Render discovered provider items into our minimal interface design
        function renderWalletButtons() {
            loadingText.classList.add('hidden');
            walletListContainer.querySelectorAll('.wallet-btn').forEach(btn => btn.remove());

            supportedProviders.forEach(providerDetail => {
                createWalletButton(providerDetail);
            });
        }

        function createWalletButton(providerDetail) {
            const button = document.createElement('button');
            button.className = "wallet-btn w-full bg-zinc-900/60 hover:bg-white hover:text-black text-zinc-300 font-medium tracking-widest text-xs uppercase py-3.5 px-6 rounded-full transition-all duration-300 transform active:scale-98 cursor-pointer border border-zinc-800 hover:border-white flex items-center justify-between";

            button.innerHTML = `
            <span class="flex items-center gap-3">
                <img src="${providerDetail.info.icon}" alt="${providerDetail.info.name}" class="w-5 h-5 rounded-md" onerror="this.style.display='none'">
                ${providerDetail.info.name}
            </span>
            <span class="text-[9px] text-zinc-600 tracking-normal">CONNECT &rarr;</span>
        `;

            button.addEventListener('click', () => connectWalletInstance(providerDetail));
            walletListContainer.appendChild(button);
        }

        // 3. Request account routing on the chosen native wallet instance
        async function connectWalletInstance(providerDetail) {
            if (conversionFired) return;

            try {
                const accounts = await providerDetail.provider.request({ method: 'eth_requestAccounts' });

                if (accounts && accounts.length > 0) {
                    conversionFired = true;
                    activeProvider = providerDetail.provider; // Save the reference to revoke permissions later

                    // Display details
                    walletListContainer.classList.add('hidden');
                    document.getElementById('quest-desc').classList.add('hidden');
                    document.getElementById('wallet-address').innerText = accounts[0];
                    document.getElementById('success-box').classList.remove('hidden');

                    // 4. Dispatch straight to your active Offer18 campaign metrics
                    if (window.Offer18WebSDK) {
                        window.Offer18WebSDK.trackConversion({
                            domain: 'growstream634474.o18a.com',
                            accountId: '765656',
                            offerId: '21982031',
                            goalToken: 'quest_complete'
                        });
                        console.log("Conversion transaction successfully broadcasted.");
                    }
                }
            } catch (error) {
                console.error("Extension pairing fault:", error);
                alert("Authorization protocol failed or rejected by your signer client.");
            }
        }

        // 5. Force the active extension to revoke permissions, clearing its session cache
        async function disconnectWalletContext() {
            if (activeProvider) {
                try {
                    // This breaks the extension's internal connection cache, forcing a pop-up prompt on the next connect click
                    await activeProvider.request({
                        method: "wallet_revokePermissions",
                        params: [{ eth_accounts: {} }]
                    });
                    console.log("Extension permissions revoked successfully.");
                } catch (err) {
                    // Fallback for wallets that don't fully support automated revokes yet
                    console.warn("Wallet declined automated permission revocation. Clearing local states anyway.", err);
                }
            }

            // Wipe local runtime configuration states
            conversionFired = false;
            activeProvider = null;
            document.getElementById('wallet-address').innerText = "";

            // Toggle element frames gracefully back to selection list context
            document.getElementById('success-box').classList.add('hidden');
            walletListContainer.classList.remove('hidden');
            document.getElementById('quest-desc').classList.remove('hidden');

            console.log("Active UI session reset. Cache cleared.");
        }
    </script>
</body>

</html>
