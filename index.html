<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quest</title>

    <!-- Tailwind CSS for Layout Architecture -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts: Playfair Display for headers & Reenie Beanie for a striking cursive accent -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Reenie+Beanie&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .cursive-accent {
            font-family: 'Reenie Beanie', cursive;
            font-size: 3.5rem;
            line-height: 1;
        }

        .serif-title {
            font-family: 'Playfair Display', serif;
        }
    </style>

    <!-- 1. Include Offer18 Web SDK -->
    <script src="https://web-resources.offer18.net/sdk/web/WebSDK.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (window.Offer18WebSDK) {
                window.Offer18WebSDK.initializeUrlParam('clickid');
                console.log("Offer18 SDK initialized.");
            }
        });
    </script>

    <!-- 2. Include Ethers.js -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>
</head>

<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-6 select-none">

    <!-- Minimalist Content Card -->
    <div class="max-w-md w-full border border-zinc-800 bg-zinc-950/40 rounded-3xl p-10 text-center backdrop-blur-sm">

        <!-- Cursive Accent Header -->
        <span class="cursive-accent block text-zinc-400 mb-1">the journey</span>

        <!-- Serif Main Header -->
        <h1 class="serif-title text-4xl font-light tracking-wide mb-3 uppercase text-zinc-100">
            Verify Identity
        </h1>

        <p class="text-zinc-500 font-light text-xs tracking-wider uppercase mb-12 max-w-xs mx-auto leading-relaxed">
            Link your signature wallet below to log verification details.
        </p>

        <!-- Dynamic Action Space -->
        <div id="wallet-actions">
            <button id="connect-btn" onclick="connectWallet()"
                class="w-full bg-white hover:bg-zinc-200 text-black font-medium tracking-widest text-xs uppercase py-4 px-8 rounded-full transition-all duration-300 transform active:scale-98 cursor-pointer border border-transparent hover:border-zinc-400">
                Connect Wallet
            </button>
        </div>

        <!-- Minimal Success UI (Hidden by default) -->
        <div id="success-box" class="hidden mt-4 pt-6 border-t border-zinc-900 transition-all duration-500">
            <span class="cursive-accent block text-emerald-500 mb-2">completed</span>

            <p class="text-zinc-400 text-xs font-light tracking-widest uppercase mb-4">
                Session Active
            </p>

            <div id="wallet-address"
                class="text-[10px] text-zinc-500 font-mono tracking-normal bg-zinc-900/30 border border-zinc-900/80 p-3 rounded-xl break-all">
            </div>

            <p class="text-[10px] text-zinc-600 font-light tracking-wide mt-4 italic">
                Data packet routed via proxy node.
            </p>
        </div>
    </div>

    <!-- Footnote Component -->
    <p class="text-[10px] text-zinc-700 tracking-widest uppercase mt-8 absolute bottom-6 serif-title">
        Web3Cash Integration Layer
    </p>

    <!-- Core Connection & Routing Logic -->
    <script>
        async function connectWallet() {
            const connectBtn = document.getElementById('connect-btn');

            if (typeof window.ethereum === 'undefined') {
                alert('No Web3 wallet interface found. Please launch via a Web3 companion dashboard or extension.');
                return;
            }

            try {
                connectBtn.innerText = "SYNCHRONIZING...";
                connectBtn.disabled = true;

                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const walletAddress = await signer.getAddress();

                // UI Lifecycle updates
                document.getElementById('wallet-actions').classList.add('hidden');
                document.getElementById('wallet-address').innerText = walletAddress;
                document.getElementById('success-box').classList.remove('hidden');

                // Fire Offer18 Track Configuration
                // Change this section in your HTML file:
                if (window.Offer18WebSDK) {
                    window.Offer18WebSDK.trackConversion({
                        domain: 'growstream634474.o18a.com', // 1. Update to your actual tracking domain
                        accountId: '765656',                 // 2. Update to your Affiliate ID
                        offerId: '21982031',                 // 3. Update to your Offer ID
                        goalToken: 'quest_complete'          // 4. Matches your Offer18 goal name
                    });
                    console.log("Transmission initialized targeting proxy system node.");
                }

            } catch (error) {
                console.error("Linkage fault:", error);
                alert("Authorization protocol failed or rejected by local signer client.");

                connectBtn.innerText = "CONNECT WALLET";
                connectBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
